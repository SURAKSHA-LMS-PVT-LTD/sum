<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
    
    <!-- SEO & Meta Tags -->
    <title data-default-title="Suraksha LMS Login | Online Learning Management System Login Portal"></title>
    <meta name="description" content="Login to Suraksha LMS - Complete online learning management system for educational institutions. Secure student login, teacher dashboard, attendance tracking, exam management, and homework submission at lms.suraksha.lk" />
    <meta name="keywords" content="Suraksha LMS login, LMS login portal, online education login, school management system, student login, teacher login, LMS dashboard, attendance system, exam management, learning management, Suraksha education platform, LMS system, online classroom, digital education" />
    <meta name="author" content="SurakshaLMS" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://lms.suraksha.lk/" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Theme color for status bar on mobile -->
    <meta name="theme-color" content="#f9fafb" id="theme-color-meta" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="" id="apple-web-app-title-meta" data-default-content="Suraksha LMS" />
    
    <!-- Favicons - served from same origin to avoid CORS issues on custom domains -->
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3C/svg%3E" sizes="any" data-default-href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3C/svg%3E" data-default-href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3C/svg%3E" data-default-href="/favicon.ico" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3C/svg%3E" data-default-href="/favicon.png" />
    <link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3C/svg%3E" data-default-href="/favicon.ico" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Suraksha LMS Login - Educational Learning Management System" />
    <meta property="og:description" content="Secure login to Suraksha LMS. Complete learning management platform with student portal, teacher dashboard, attendance, exams, and more." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lms.suraksha.lk/" />
    <meta property="og:site_name" content="Suraksha LMS" />
    <meta property="og:image" content="https://suraksha.lk/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Suraksha LMS Login Portal" />
    <meta name="twitter:description" content="Login to Suraksha LMS - Complete Learning Management System for educational institutions. Student login, teacher dashboard, attendance, exams." />
    <meta name="twitter:image" content="https://suraksha.lk/twitter-image.png" />
    <meta name="twitter:creator" content="@SurakshaLMS" />

    <!-- Schema.org Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Suraksha LMS",
      "description": "Complete Learning Management System for educational institutions",
      "url": "https://lms.suraksha.lk",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Android, iOS, Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "LKR"
      },
      "creator": {
        "@type": "Organization",
        "name": "Suraksha LMS",
        "url": "https://suraksha.lk"
      }
    }
    </script>

    <!-- Fonts are bundled locally via @fontsource/inter (imported in main.tsx) -->

    <script>
      (function() {
        var root = document.documentElement;
        var stored;
        try { stored = localStorage.getItem('theme'); } catch (e) {}
        var theme = stored || 'light';
        if (theme === 'system') {
          theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        root.classList.remove('light', 'dark');
        root.classList.add(theme);
        // Update theme-color meta for native status bar
        var meta = document.getElementById('theme-color-meta');
        if (meta) {
          var isDark = theme === 'dark';
          var bg = isDark ? '#14171f' : '#f9fafb';
          meta.setAttribute('content', bg);
        }
      })();

      // Apply cached tenant branding (favicon + title) immediately — before React loads.
      // For tenant domains with no cache, keep title/favicon blank until backend branding arrives.
      (function() {
        try {
          var hostname = window.location.hostname;
          var isTenant = false;
          var cacheKey = null;
          var blankFavicon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'%3E%3C/svg%3E";
          var titleEl = document.querySelector('title');
          var defaultTitle = titleEl ? (titleEl.getAttribute('data-default-title') || '') : '';
          var appleTitleMeta = document.getElementById('apple-web-app-title-meta');
          var defaultAppleTitle = appleTitleMeta ? (appleTitleMeta.getAttribute('data-default-content') || '') : '';
          var iconLinks = document.querySelectorAll("link[rel~='icon'], link[rel~='shortcut'], link[rel='apple-touch-icon']");

          function setIconsToDefault() {
            for (var i = 0; i < iconLinks.length; i++) {
              var defHref = iconLinks[i].getAttribute('data-default-href');
              if (defHref) iconLinks[i].href = defHref;
            }
          }

          function setIconsToBlank() {
            for (var i = 0; i < iconLinks.length; i++) {
              iconLinks[i].href = blankFavicon;
            }
          }

          if (hostname !== 'localhost' && hostname !== '127.0.0.1') {
            var surakshaMatch = hostname.match(/^([a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)\.suraksha\.lk$/i);
            var defaultSubs = ['lms', 'org', 'admin', 'transport', 'api', 'lmsapi', 'storage', 'www'];
            if (surakshaMatch && !defaultSubs.includes(surakshaMatch[1].toLowerCase())) {
              isTenant = true;
              cacheKey = 'suraksha_tenant_branding_' + surakshaMatch[1].toLowerCase();
            } else if (!surakshaMatch) {
              var localMatch = hostname.match(/^([a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)\.localhost$/i);
              if (localMatch) {
                isTenant = true;
                cacheKey = 'suraksha_tenant_branding_' + localMatch[1].toLowerCase();
              } else {
                // Custom domain
                isTenant = true;
                cacheKey = 'suraksha_tenant_branding_' + hostname;
              }
            }
          } else {
            var devParams = new URLSearchParams(window.location.search);
            var devSub = devParams.get('subdomain');
            if (devSub) {
              isTenant = true;
              cacheKey = 'suraksha_tenant_branding_' + devSub;
            }
          }

          // Default Suraksha domain: apply default title/favicon values.
          if (!isTenant || !cacheKey) {
            if (defaultTitle) document.title = defaultTitle;
            if (appleTitleMeta) appleTitleMeta.setAttribute('content', defaultAppleTitle);
            setIconsToDefault();
            return;
          }

          var raw = localStorage.getItem(cacheKey);
          if (!raw) {
            document.title = '';
            if (appleTitleMeta) appleTitleMeta.setAttribute('content', '');
            setIconsToBlank();
            return;
          }

          var branding = JSON.parse(raw);
          var resolvedTitle = branding.customAppName || branding.name || '';
          if (resolvedTitle) {
            document.title = resolvedTitle;
            if (appleTitleMeta) appleTitleMeta.setAttribute('content', resolvedTitle);
          } else {
            document.title = '';
            if (appleTitleMeta) appleTitleMeta.setAttribute('content', '');
          }

          // Apply favicon immediately — replace all icon links
          if (branding.faviconUrl) {
            var faviconHref = branding.faviconUrl;
            // If it's a relative path (storage key), it will be resolved by the app later;
            // only apply absolute URLs here to avoid broken icons before JS resolvers load.
            if (faviconHref && faviconHref.indexOf('http') === 0) {
              for (var i = 0; i < iconLinks.length; i++) {
                iconLinks[i].href = faviconHref;
              }
            }
          }
        } catch (e) { /* ignore — branding will be applied by React */ }
      })();
    </script>
  </head>

  <body style="margin:0">
    <div id="google_translate_element" style="position:absolute;top:-9999px;left:-9999px;visibility:hidden;"></div>
    <div id="root" class="notranslate"></div>
    <div id="portal-root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Google Translate init — sets up the hidden widget
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,si,ta',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false,
        }, 'google_translate_element');
        // Signal to React that GT is ready
        window.__GT_READY = true;
        window.dispatchEvent(new Event('gt-ready'));
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
