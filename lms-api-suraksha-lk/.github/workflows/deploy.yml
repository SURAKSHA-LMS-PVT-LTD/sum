name: Deploy Backend (lms-api)

# This workflow lives IN the backend repo (SURAKSHA-LMS-PVT-LTD/lms.api.suraksha.lk).
# Deploys the NestJS API on push to `production`. Two targets:
#   • vm        → SSH to the GCE VM and run the deploy script (default; PM2)
#   • cloudrun  → build a container and deploy to Cloud Run (selectable)
# Runs DB migrations after a successful VM deploy.

on:
  push:
    branches: [production]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        type: choice
        options: [vm, cloudrun]
        default: vm
      run_migrations:
        description: 'Run DB migrations after deploy'
        type: boolean
        default: true

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  # ── 1. Build & typecheck gate ───────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck
        run: npx tsc -p tsconfig.build.json --noEmit
      - name: Build
        run: npm run build

  # ── 2a. Deploy to the VM via SSH (default) ──────────────────────────────────
  deploy-vm:
    needs: build
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'vm')
    steps:
      - name: SSH deploy + migrate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            bash ~/apps/lms-api/deploy/scripts/02-deploy-backend.sh production
            if [ "${{ inputs.run_migrations }}" != "false" ]; then
              bash ~/apps/lms-api/deploy/scripts/05-db-migrate.sh || \
                (cd ~/apps/lms-api && npm run migration:run)
            fi

  # ── 2b. Deploy to Cloud Run (optional) ──────────────────────────────────────
  deploy-cloudrun:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'cloudrun'
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & push image
        run: |
          gcloud builds submit . \
            --tag "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lms/lms-api:${{ github.sha }}"
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy lms-api \
            --image "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/lms/lms-api:${{ github.sha }}" \
            --region "${{ secrets.GCP_REGION }}" --platform managed \
            --port 8080 --allow-unauthenticated
      # Migrations: run as a one-off after deploy — never on cold start.
