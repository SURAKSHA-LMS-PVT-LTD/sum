# Security headers for frontend (SPA)
add_header X-Frame-Options              "DENY"                          always;
add_header X-Content-Type-Options       "nosniff"                       always;
add_header X-XSS-Protection             "1; mode=block"                 always;
add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
add_header Permissions-Policy           "geolocation=(), microphone=(), camera=(), payment=()" always;
add_header Cross-Origin-Opener-Policy   "same-origin"                   always;
add_header Cross-Origin-Embedder-Policy "require-corp"                  always;

# CSP — adjust connect-src if your API domain changes
add_header Content-Security-Policy
  "default-src 'self';
   script-src 'self' 'unsafe-inline' https://*.google.com https://*.googleapis.com https://*.gstatic.com https://www.googletagmanager.com;
   style-src 'self' 'unsafe-inline' https://*.googleapis.com https://*.gstatic.com;
   connect-src 'self' https://lmsapi.suraksha.lk wss://lmsapi.suraksha.lk https://*.googleapis.com https://*.firebase.io https://fcm.googleapis.com;
   img-src 'self' data: blob: https: http://translate.google.com;
   font-src 'self' data: https://*.gstatic.com https://*.googleapis.com;
   frame-src 'self' https://*.google.com https://*.googleapis.com;
   frame-ancestors 'none';
   base-uri 'self';
   form-action 'self';
   worker-src 'self' blob:;"
  always;
