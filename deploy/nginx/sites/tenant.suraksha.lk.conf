# Wildcard subdomain config for institute tenant portals (*.suraksha.lk)
# Also handles custom domains via server_name wildcard + default_server fallback.
# The root must point to the same dist as lms.suraksha.lk — it's one SPA.

# HTTP → HTTPS redirect for all subdomains
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?!lms\.|lmsapi\.|admin\.|org\.|transport\.)(.+)\.suraksha\.lk$;
    return 301 https://$host$request_uri;
}

# HTTPS — wildcard *.suraksha.lk
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    # Matches any subdomain not already handled by an explicit vhost
    server_name ~^(?!lms\.|lmsapi\.|admin\.|org\.|transport\.)(.+)\.suraksha\.lk$;

    # Wildcard cert — must be issued for *.suraksha.lk
    ssl_certificate     /etc/letsencrypt/live/suraksha.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suraksha.lk/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;

    # Same dist as the main lms vhost — one SPA serves all tenants
    root  /var/www/lms;
    index index.html;

    access_log /var/log/nginx/tenant-access.log combined;
    error_log  /var/log/nginx/tenant-error.log  warn;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        image/svg+xml font/woff font/woff2;

    # Vite hashed assets → serve from disk, return 404 if missing (NEVER fallback to index.html)
    # This is the critical fix: JS/CSS chunks must NOT be caught by the SPA fallback.
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        try_files $uri =404;
        expires      365d;
        add_header   Cache-Control "public, immutable";
        add_header   X-Content-Type-Options "nosniff" always;
        access_log   off;
    }

    # Service worker
    location = /firebase-messaging-sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        add_header Service-Worker-Allowed "/";
    }

    location = /robots.txt  { try_files $uri =404; access_log off; }
    location = /favicon.ico { try_files $uri =404; access_log off; log_not_found off; }

    # SPA fallback — React Router handles all routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}

# Custom domain fallback — catches any HTTPS host not matched above
# Institutes using their own domain (e.g. portal.school.lk) land here.
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;

    # Fallback self-signed or wildcard cert — replace with a proper wildcard or use
    # a cert provisioned per custom domain (e.g. via certbot --expand or acme.sh).
    ssl_certificate     /etc/letsencrypt/live/suraksha.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suraksha.lk/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;

    root  /var/www/lms;
    index index.html;

    access_log /var/log/nginx/custom-domain-access.log combined;
    error_log  /var/log/nginx/custom-domain-error.log  warn;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        image/svg+xml font/woff font/woff2;

    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        try_files $uri =404;
        expires      365d;
        add_header   Cache-Control "public, immutable";
        add_header   X-Content-Type-Options "nosniff" always;
        access_log   off;
    }

    location = /firebase-messaging-sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        add_header Service-Worker-Allowed "/";
    }

    location = /robots.txt  { try_files $uri =404; access_log off; }
    location = /favicon.ico { try_files $uri =404; access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}
