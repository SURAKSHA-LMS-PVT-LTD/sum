# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name lms.suraksha.lk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lms.suraksha.lk;

    ssl_certificate     /etc/letsencrypt/live/lms.suraksha.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lms.suraksha.lk/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;
    include /etc/nginx/snippets/security-headers.conf;

    root  /var/www/lms;
    index index.html;

    access_log /var/log/nginx/lms-access.log combined;
    error_log  /var/log/nginx/lms-error.log  warn;

    # Gzip static assets
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        image/svg+xml font/woff font/woff2;

    # Vite hashed assets → cache forever (immutable)
    location ~* \.(js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        try_files $uri =404;
        expires      365d;
        add_header   Cache-Control "public, immutable";
        add_header   X-Content-Type-Options "nosniff" always;
        access_log   off;
    }

    # Service worker — MUST NOT be cached (browser checks for updates)
    location = /firebase-messaging-sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        add_header Service-Worker-Allowed "/";
    }

    # robots.txt
    location = /robots.txt {
        try_files $uri =404;
        access_log off;
    }

    # favicon
    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # SPA fallback — React Router handles all routes
    location / {
        try_files $uri $uri/ /index.html;
        # index.html must not be cached so users always get latest app
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}
