# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name lmsapi.suraksha.lk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lmsapi.suraksha.lk;

    ssl_certificate     /etc/letsencrypt/live/lmsapi.suraksha.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lmsapi.suraksha.lk/privkey.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # API-only security headers (no CSP — API returns JSON, not HTML)
    add_header X-Frame-Options        "DENY"    always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/lmsapi-access.log combined;
    error_log  /var/log/nginx/lmsapi-error.log  warn;

    # Allow large file uploads (payment receipts, homework, etc.)
    client_max_body_size 16M;

    # Timeouts
    proxy_connect_timeout  60s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;
    send_timeout          120s;

    # Gzip for API responses
    gzip on;
    gzip_types application/json application/javascript text/plain;
    gzip_min_length 512;

    # Rate limiting at nginx level (extra layer on top of NestJS throttler)
    # 20 req/s per IP, burst 40
    limit_req zone=api_limit burst=40 nodelay;

    # Auth endpoints: tighter limit — 5 req/s, burst 10, no nodelay
    # Catches brute-force before it even reaches NestJS throttler
    location ~ ^/v2/auth/(institute|mobile)/(login|refresh) {
        limit_req zone=auth_limit burst=10;
        limit_req_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Required headers for NestJS to see real client IP and proto
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Socket.IO / live lectures)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable buffering for SSE / streaming responses
        proxy_buffering    off;
        proxy_cache        off;

        # Prevent nginx from rewriting redirects from the upstream
        proxy_redirect     off;
    }

    # Health check — no rate limiting, no auth
    location = /health {
        proxy_pass         http://127.0.0.1:8080/health;
        proxy_read_timeout 5s;
        access_log         off;
        limit_req_status   200;
        limit_req          off;
    }
}
